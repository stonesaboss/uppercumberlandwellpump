<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration of a rural Upper Cumberland property with a home, hills and private well equipment">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8FC4E8"/>
      <stop offset="0.6" stop-color="#C9E4F5"/>
      <stop offset="1" stop-color="#E8F4FB"/>
    </linearGradient>
    <linearGradient id="ridgeFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5E80A3"/>
      <stop offset="1" stop-color="#7C9BB8"/>
    </linearGradient>
    <linearGradient id="ridgeNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3E617F"/>
      <stop offset="1" stop-color="#54789A"/>
    </linearGradient>
    <linearGradient id="fieldFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5F8B54"/>
      <stop offset="1" stop-color="#4C7A44"/>
    </linearGradient>
    <linearGradient id="fieldNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3E6E3B"/>
      <stop offset="1" stop-color="#245F35"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- clouds -->
  <g fill="#FFFFFF" opacity="0.85">
    <ellipse cx="300" cy="140" rx="110" ry="30"/>
    <ellipse cx="380" cy="120" rx="80" ry="24"/>
    <ellipse cx="1150" cy="100" rx="130" ry="30"/>
    <ellipse cx="1250" cy="125" rx="90" ry="24"/>
    <ellipse cx="750" cy="180" rx="70" ry="18" opacity="0.7"/>
  </g>

  <!-- far ridge -->
  <path d="M0 430 L140 330 L260 400 L420 300 L560 390 L700 320 L840 410 L980 330 L1120 400 L1280 310 L1420 390 L1600 330 L1600 560 L0 560 Z" fill="url(#ridgeFar)"/>
  <!-- near ridge -->
  <path d="M0 500 L180 400 L340 470 L520 380 L680 460 L860 390 L1040 470 L1220 400 L1400 470 L1600 410 L1600 640 L0 640 Z" fill="url(#ridgeNear)"/>

  <!-- rolling fields -->
  <path d="M0 560 C260 500 520 520 800 560 C1080 600 1340 580 1600 530 L1600 900 L0 900 Z" fill="url(#fieldFar)"/>
  <path d="M0 680 C300 620 620 640 900 690 C1180 740 1400 720 1600 670 L1600 900 L0 900 Z" fill="url(#fieldNear)"/>

  <!-- tree line -->
  <g fill="#1E4A2A">
    <path d="M120 560 l26 -70 26 70 z M146 505 l-20 55 h40 z"/>
    <path d="M180 570 l22 -58 22 58 z"/>
    <path d="M1380 560 l26 -70 26 70 z"/>
    <path d="M1440 575 l22 -58 22 58 z"/>
    <path d="M1330 575 l20 -52 20 52 z"/>
    <path d="M60 580 l20 -52 20 52 z"/>
  </g>

  <!-- farmhouse -->
  <g>
    <rect x="620" y="470" width="220" height="120" fill="#F5F1E8"/>
    <path d="M600 470 L730 390 L860 470 Z" fill="#83552E"/>
    <rect x="700" y="520" width="46" height="70" fill="#4A5A68"/>
    <rect x="646" y="500" width="38" height="34" fill="#9CC3DD"/>
    <rect x="782" y="500" width="38" height="34" fill="#9CC3DD"/>
    <rect x="760" y="404" width="18" height="50" fill="#5E4326"/>
    <!-- porch -->
    <rect x="612" y="586" width="236" height="10" fill="#C9BFA8"/>
  </g>

  <!-- barn -->
  <g>
    <rect x="1080" y="500" width="150" height="90" fill="#8A3B31"/>
    <path d="M1068 500 L1155 448 L1242 500 Z" fill="#5E2A23"/>
    <rect x="1135" y="530" width="40" height="60" fill="#4A241E"/>
    <path d="M1135 530 h40 v60 h-40 z M1135 530 l40 60 M1175 530 l-40 60" stroke="#C9BFA8" stroke-width="4" fill="none"/>
  </g>

  <!-- well head + pressure tank + control post -->
  <g>
    <!-- concrete pad -->
    <ellipse cx="380" cy="742" rx="150" ry="24" fill="#B9C4CC"/>
    <!-- well casing -->
    <rect x="300" y="640" width="34" height="96" rx="6" fill="#8296A7"/>
    <rect x="294" y="632" width="46" height="14" rx="5" fill="#5B6B79"/>
    <!-- pitless line to tank -->
    <path d="M334 720 H400" stroke="#5B6B79" stroke-width="8" stroke-linecap="round"/>
    <!-- pressure tank -->
    <rect x="398" y="618" width="64" height="118" rx="30" fill="#2C6FA8"/>
    <rect x="398" y="618" width="64" height="118" rx="30" fill="none" stroke="#1D4F7C" stroke-width="4"/>
    <rect x="420" y="736" width="20" height="12" fill="#5B6B79"/>
    <ellipse cx="430" cy="626" rx="18" ry="8" fill="#3F82BC"/>
    <!-- control box post -->
    <rect x="490" y="660" width="10" height="80" fill="#6B5335"/>
    <rect x="478" y="640" width="34" height="42" rx="4" fill="#D8E1E7" stroke="#8296A7" stroke-width="3"/>
    <!-- gauge -->
    <circle cx="410" cy="700" r="9" fill="#F4F7F9" stroke="#1D4F7C" stroke-width="3"/>
  </g>

  <!-- fence -->
  <g stroke="#7A6448" stroke-width="6" stroke-linecap="round">
    <line x1="920" y1="700" x2="920" y2="750"/>
    <line x1="1000" y1="695" x2="1000" y2="748"/>
    <line x1="1080" y1="692" x2="1080" y2="745"/>
    <line x1="1160" y1="690" x2="1160" y2="742"/>
    <line x1="905" y1="712" x2="1175" y2="702"/>
    <line x1="905" y1="734" x2="1175" y2="724"/>
  </g>
</svg>
